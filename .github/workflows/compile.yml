name: Build ESPHome

on:
  workflow_dispatch: # Позволява ни да стартираме компилацията ръчно с един бутон

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile ESPHome Firmware
        uses: esphome/build-action@v6
        with:
          yaml-file: alpicool.yaml
          version: latest

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpicool-firmware
          path: |
            */alpicool-fridge.factory.bin
            */manifest.json
